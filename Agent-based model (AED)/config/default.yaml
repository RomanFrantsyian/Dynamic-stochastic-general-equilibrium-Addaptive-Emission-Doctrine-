# Default simulation parameters

# Agent counts
num_commercial_banks: 5
num_innovator_firms: 20
num_implementer_firms: 100
num_households: 500
num_investors: 20

# Initial conditions
initial_money_supply: 100000000
bank_initial_reserves: 10000000
innovator_initial_debt: 2000000
innovator_initial_capital: 1000000
implementer_initial_debt: 500000
implementer_initial_capital: 500000

# Production parameters
base_wage: 1000.0
innovator_rd_intensity: 0.15
innovator_patent_success_rate: 0.30

# Financial parameters
bank_base_interest_rate: 0.07
bank_min_capital_ratio: 0.08

# Household parameters
household_consumption_propensity: 0.8

# Central bank parameters
price_target: 1.0
inflation_buffer: 1.02
key_interest_rate: 0.05

# Government parameters
tax_rate: 0.35
social_spending_rate: 0.60
infrastructure_spending_rate: 0.40

# Scenario mode (overridden by scenario files)
scenario_mode: 'BASELINE'
emission_coverage_ratio: 0.0
