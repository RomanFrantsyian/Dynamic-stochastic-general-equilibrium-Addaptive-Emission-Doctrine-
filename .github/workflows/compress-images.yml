name: Compress All Images(WebP)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Convert PNGs to WebP Lossless
        run: |
          python3 << 'EOF'
          from PIL import Image
          import pathlib
          import os

          for path in pathlib.Path('.').rglob('*.png'):

              if any(part in ['.git', '.venv', 'node_modules'] for part in path.parts):
                  continue

              try:
                  img = Image.open(path)

                  webp_path = path.with_suffix('.webp')

                  img.save(
                      webp_path,
                      'WEBP',
                      lossless=True,
                      method=6
                  )

                  os.remove(path)

                  print(f"Converted: {path} -> {webp_path}")

              except Exception as e:
                  print(f"Failed: {path}: {e}")
          EOF

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Compress images to WebP"
          fi

      - name: Push Changes
        run: |
          git push origin HEAD:Compressed
